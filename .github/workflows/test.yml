name: Tests

on:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore MariBot.sln

      - name: Build
        run: dotnet build MariBot.sln --no-restore

      - name: Test
        run: dotnet test MariBot.sln --no-build --verbosity normal
